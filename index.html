<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KML / GPX / KMZ 互转工具</title>
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo-mark" aria-hidden="true">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
            <circle cx="12" cy="9" r="2.5" />
          </svg>
        </div>
        <div class="title-row">
          <h1>KML / KMZ / GPX 互转</h1>
          <span class="version-badge" aria-label="当前版本">V1.1.1</span>
        </div>
        <p class="tagline">轨迹 · 路点 · 起终点 · 时间戳</p>
      </header>

      <main>
        <section class="upload-section">
          <div id="dropZone" class="drop-zone" role="button" tabindex="0">
            <input
              type="file"
              id="fileInput"
              accept=".kml,.kmz,.gpx,application/vnd.google-earth.kml+xml,application/vnd.google-earth.kmz,application/gpx+xml"
              multiple
              hidden
            />
            <svg
              class="drop-icon"
              width="40"
              height="40"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p class="drop-text">
              拖放 KML、KMZ 或 GPX 文件到此处，或<span class="link">点击选择</span>（可多选）
            </p>
            <div class="drop-hint" aria-hidden="true">
              <span>.kml</span>
              <span>.kmz</span>
              <span>.gpx</span>
            </div>
          </div>
        </section>

        <section class="options-section">
          <span class="section-label">导出选项</span>
          <div class="options-row">
            <label for="startName">起点名称：</label>
            <input type="text" id="startName" value="Start" placeholder="Start" />
            <label for="endName">终点名称：</label>
            <input type="text" id="endName" value="End" placeholder="End" />
          </div>
          <div class="options-row">
            <label><input type="checkbox" id="preserveTime" checked /> 保留时间戳</label>
          </div>
        </section>

        <section class="convert-section">
          <label for="convertDirection">转换方向：</label>
          <select id="convertDirection">
            <option value="auto">自动（根据文件类型）</option>
            <option value="gpx2kml">GPX → KML</option>
            <option value="gpx2kmz">GPX → KMZ</option>
            <option value="kml2gpx">KML → GPX</option>
            <option value="kml2kmz">KML → KMZ</option>
            <option value="kmz2kml">KMZ → KML</option>
            <option value="kmz2gpx">KMZ → GPX</option>
          </select>
          <button type="button" id="convertBtn" disabled>转换并下载</button>
        </section>

        <section id="previewSection" class="preview-section" hidden>
          <h3>预览</h3>
          <div id="mapPreview" class="map-preview" aria-label="轨迹卫星地图预览"></div>
          <div id="previewContent" class="preview-content"></div>
        </section>

        <section id="batchSection" class="batch-section" hidden>
          <h3>批量结果</h3>
          <div id="batchList" class="batch-list"></div>
        </section>

        <section class="status-section">
          <p id="statusMessage" class="status-message" aria-live="polite"></p>
        </section>

        <section class="info-section">
          <h2>说明</h2>
          <p>
            支持 <strong>KML</strong>、<strong>KMZ</strong>、<strong>GPX</strong>
            三种格式互转。输出包含轨迹点、轨迹线、起终点路点，可直接在 Google Earth
            中打开。支持多轨迹、仅路点、批量转换与时间戳保留。
          </p>
          <p>转换在本地完成，文件不会上传到任何服务器。</p>
        </section>
      </main>

      <footer class="app-footer">
        <span>V1.1.1</span>
        <span>本地转换</span>
        <span>MIT License</span>
      </footer>
    </div>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/jszip/jszip.min.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/builder.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
